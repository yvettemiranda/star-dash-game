<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#10141f">
    <title>星轨闪避</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="game-wrap" aria-label="星轨闪避游戏">
        <canvas id="game" width="720" height="1280"></canvas>

        <div class="hud" aria-live="polite">
          <div>
            <span class="label">分数</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">最佳</span>
            <strong id="best">0</strong>
          </div>
          <button id="pauseBtn" class="icon-btn" type="button" aria-label="暂停">Ⅱ</button>
        </div>

        <div id="panel" class="panel">
          <h1>星轨闪避</h1>
          <p id="panelText">拖动飞船，躲开陨石，吃到蓝色能量。越久越快。</p>
          <button id="startBtn" type="button">开始</button>
        </div>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
